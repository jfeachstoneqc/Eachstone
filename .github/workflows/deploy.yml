name: Deploy

on:
  push:
    branches:
      - main
      - claude/show-website-demo-nY83N
  workflow_dispatch:

jobs:
  migrate:
    name: Supabase Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations
        run: |
          supabase db push \
            --project-ref qpxmswekynrrvwmeogpg \
            --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy email templates
        run: |
          TEMPLATE_CONTENT=$(cat supabase/templates/confirmation.html)
          curl -s -X PATCH \
            "https://api.supabase.com/v1/projects/qpxmswekynrrvwmeogpg/config/auth" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg subject "Confirmez votre inscription à Eachstone" \
              --arg content "$TEMPLATE_CONTENT" \
              '{
                mailer_subjects_confirmation: $subject,
                mailer_templates_confirmation_content: $content
              }')"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
